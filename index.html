<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RA Security - Landing</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial;background:#07102a;color:#fff;}
    /* container */
    #vanta-bg { position:fixed; inset:0; z-index:-1; }
    .hero { position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:left; padding:4rem; }
    .hero-inner { max-width:1100px; }
    h1 { font-size:64px; margin:0 0 0.4rem; line-height:1; font-weight:800; }
    p.lead { color:#c9d6e6; margin-bottom:1.5rem; }
    .cta { display:inline-block; padding:12px 22px; background:#1f6feb; color:#fff; border-radius:6px; text-decoration:none; font-weight:700;}
    nav { position:fixed; top:20px; right:20px; z-index:10; }
    nav a { color:#9fb7ff; margin-left:14px; text-decoration:none; font-weight:600; }
    @media (max-width:720px){ h1{font-size:34px;} .hero{padding:2rem} }
  </style>
</head>
<body>

<!-- Vanta background -->
<div id="vanta-bg"></div>

<!-- Nav -->
<nav>
  <a href="secdashboard.html">Dashboard</a>
  <a href="README.md">Docs</a>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-inner">
    <h1>PROACTIVE <span style="color:#b76bff">IN DEFENSE</span></h1>
    <p class="lead">Integrating advanced human expertise with Generative AI. We hunt threats before they hunt you.</p>
    <a class="cta" href="secdashboard.html">Open Security Dashboard →</a>
  </div>
</section>

<!-- scripts: three + vanta -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://www.vantajs.com/dist/vanta.halo.min.js"></script>
<script>
  // optional: disable on small screens for performance
  if (window.innerWidth > 720) {
    VANTA.HALO({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      baseColor: 0x13486,        // warna utama shape (0x...)
      backgroundColor: 0xb183d, // warna background (0x...)
      size: 1.2,                 // ukuran shape
      amplitudeFactor: 1.0,      // "gelombang" intensity
      xOffset: 0.0,
      yOffset: 0.0,
      amplitude: 1.2,
      speed: 0.9
    });
  } else {
    // (opsional) fallback: solid background color on mobile
    document.getElementById('vanta-bg').style.background = '#07102a';
  }
</script>

</body>
</html>
