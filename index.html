<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Security Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CDN Tailwind & Chart.js biar gampang -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6 space-y-6">
    <h1 class="text-3xl font-bold">Security Dashboard</h1>

    <!-- Ringkasan angka -->
    <div class="grid md:grid-cols-3 gap-4">
      <div class="bg-slate-800 rounded-xl p-4">
        <p class="text-sm text-slate-400">Total Request</p>
        <p class="text-2xl font-semibold" id="total-requests">12,345</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-4">
        <p class="text-sm text-slate-400">Blocked Attacks</p>
        <p class="text-2xl font-semibold text-emerald-400" id="blocked-attacks">1,234</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-4">
        <p class="text-sm text-slate-400">Suspicious IP</p>
        <p class="text-2xl font-semibold text-amber-400" id="suspicious-ip">42</p>
      </div>
    </div>

    <!-- Chart serangan per jam -->
    <div class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-xl mb-2">Attack Trend (Last 24h)</h2>
      <canvas id="attackChart" height="80"></canvas>
    </div>

    <!-- Tabel IP mencurigakan -->
    <div class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-xl mb-2">Top Suspicious IP</h2>
      <table class="w-full text-sm">
        <thead class="text-slate-400 border-b border-slate-700">
          <tr>
            <th class="text-left py-2">IP Address</th>
            <th class="text-left py-2">Country</th>
            <th class="text-left py-2">Blocked</th>
          </tr>
        </thead>
        <tbody id="ip-table" class="divide-y divide-slate-700">
          <!-- diisi via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // 👉 Nanti bagian ini bisa diganti ambil data dari Worker API
    const dummyData = {
      totalRequests: 12345,
      blockedAttacks: 1234,
      suspiciousIp: 42,
      attacksPerHour: [5, 12, 9, 20, 15, 8, 4, 10],
      hours: ["01:00","04:00","07:00","10:00","13:00","16:00","19:00","22:00"],
      ips: [
        { ip: "1.2.3.4", country: "US", blocked: 120 },
        { ip: "5.6.7.8", country: "CN", blocked: 98 },
        { ip: "9.10.11.12", country: "RU", blocked: 76 },
      ]
    };

    document.getElementById("total-requests").textContent = dummyData.totalRequests.toLocaleString();
    document.getElementById("blocked-attacks").textContent = dummyData.blockedAttacks.toLocaleString();
    document.getElementById("suspicious-ip").textContent = dummyData.suspiciousIp.toLocaleString();

    // Tabel IP
    const tbody = document.getElementById("ip-table");
    dummyData.ips.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="py-2">${row.ip}</td>
        <td class="py-2">${row.country}</td>
        <td class="py-2">${row.blocked}</td>
      `;
      tbody.appendChild(tr);
    });

    // Chart
    const ctx = document.getElementById("attackChart").getContext("2d");
    new Chart(ctx, {
      type: "line",
      data: {
        labels: dummyData.hours,
        datasets: [{
          label: "Blocked Attacks",
          data: dummyData.attacksPerHour,
          borderWidth: 2,
          fill: false,
        }]
      },
      options: {
        plugins: { legend: { labels: { color: "#e5e7eb" } } },
        scales: {
          x: { ticks: { color: "#9ca3af" } },
          y: { ticks: { color: "#9ca3af" } }
        }
      }
    });
  </script>
</body>
</html>
