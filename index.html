<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RA Security - Landing</title>
  <style>
    html,body { height:100%; margin:0; font-family:Inter,system-ui,Arial; background:#02030a; color:#fff; }
    #vanta-bg { position:fixed; inset:0; z-index:-1; }
    .container { position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:3rem; }
    .hero { max-width:1100px; width:100%; }
    .title { font-size:64px; font-weight:800; letter-spacing: -1px; margin:0 0 .6rem; line-height:1; }
    .subtitle { color: #aab3c0; font-size:18px; margin-bottom:2rem; }
    .cta { display:inline-block; padding:14px 28px; background:#1f6feb; color:white; border-radius:6px; text-decoration:none; font-weight:700; }
    nav { position:fixed; top:16px; right:16px; z-index:10; }
    nav a { color:#9fb7ff; margin-left:12px; text-decoration:none; font-weight:600; }
    /* responsive */
    @media (max-width:720px){ .title{font-size:36px} }
  </style>
</head>
<body>

<!-- Vanta background -->
<div id="vanta-bg"></div>

<!-- Navigation -->
<nav>
  <a href="/secdashboard" id="goto-dashboard">Dashboard</a>
  <a href="/about.html">About</a>
</nav>

<!-- Hero -->
<div class="container">
  <div class="hero">
    <h1 class="title">PROACTIVE <span style="color:#7b61ff">IN DEFENSE</span></h1>
    <p class="subtitle">Integrating advanced human expertise with Generative AI. We hunt threats before they hunt you.</p>
    <a class="cta" href="/secdashboard.html">Open Security Dashboard →</a>
  </div>
</div>

<!-- scripts: three.js + vanta -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://www.vantajs.com/dist/vanta.net.min.js"></script>
<script>
  // init Vanta.NET
  VANTA.NET({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    backgroundColor: 0x020617,
    color: 0x45e6ff,
    points: 12.0,
    maxDistance: 22.0,
    spacing: 18.0
  });
</script>

</body>
</html>
