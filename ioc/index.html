<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>IOC Intelligence</title>

<style>
body {
  background: #020617;
  color: #e5e7eb;
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 40px;
}

h1 {
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 18px;
  margin-left: 10px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.error {
  background: #7f1d1d;
  padding: 12px;
  border-radius: 8px;
  margin-top: 16px;
  display: none;
}

.card {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-top: 16px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.badge {
  font-weight: bold;
  padding: 4px 10px;
  border-radius: 20px;
}

.clean { background: #064e3b; }
.low { background: #1e3a8a; }
.medium { background: #78350f; }
.high { background: #7f1d1d; }

.hidden { display: none; }
</style>
</head>

<body>

<h1>IOC Intelligence</h1>

<input id="iocInput" placeholder="Enter IOC (IP / Domain / Hash)" />
<button onclick="runIOC()">Run IOC</button>

<div id="errorBox" class="error"></div>

<div id="result" class="hidden">

  <div class="card">
    <h3>Global Verdict</h3>
    <p>
      Verdict:
      <span id="verdictBadge" class="badge"></span>
    </p>
    <p>Confidence: <b id="confidence"></b></p>
  </div>

  <div class="grid">

    <div class="card">
      <h4>VirusTotal</h4>
      <p>Malicious Detections:</p>
      <p><b id="vtScore"></b></p>
    </div>

    <div class="card">
      <h4>AbuseIPDB</h4>
      <p>Abuse Confidence Score:</p>
      <p><b id="abuseScore"></b></p>
    </div>

  </div>

  <div class="card">
    <h4>Explanation</h4>
    <p id="explanation"></p>
  </div>

</div>

<script>
async function runIOC() {
  const ioc = document.getElementById("iocInput").value.trim();
  if (!ioc) return;

  resetUI();

  try {
    const res = await fetch(`/api/ioc?ioc=${encodeURIComponent(ioc)}`);
    if (!res.ok) throw new Error("API error");

    const data = await res.json();
    renderResult(data);

  } catch (err) {
    showError("Failed to fetch IOC intelligence");
  }
}

function resetUI() {
  document.getElementById("errorBox").style.display = "none";
  document.getElementById("result").classList.add("hidden");
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.innerText = msg;
  box.style.display = "block";
}

function renderResult(data) {
  document.getElementById("result").classList.remove("hidden");

  const verdict = data.verdict.toUpperCase();
  const badge = document.getElementById("verdictBadge");

  badge.innerText = verdict;
  badge.className = "badge " + verdict.toLowerCase();

  document.getElementById("confidence").innerText = data.confidence;

  // VirusTotal
  document.getElementById("vtScore").innerText =
    `${data.sources.virustotal.malicious} / ${data.sources.virustotal.total}`;

  // AbuseIPDB
  document.getElementById("abuseScore").innerText =
    data.sources.abuseipdb.score;

  // Explanation
  document.getElementById("explanation").innerText =
    data.explanation.summary;
}
</script>

</body>
</html>
