<script>
async function runIOC() {
  const ioc = document.getElementById("iocInput").value.trim();
  if (!ioc) return alert("IOC required");

  const res = await fetch(`/api/ioc?ioc=${encodeURIComponent(ioc)}`);
  const data = await res.json();

  // Verdict Badge
  document.getElementById("verdictBadge").textContent = data.verdict;
  document.getElementById("confidenceBadge").textContent = "Confidence: " + data.confidence;

  // Explanation
  document.getElementById("explanationSummary").textContent = data.explanation.summary;
  document.getElementById("explanationList").innerHTML =
    data.explanation.details.map(d => `<li>${d}</li>`).join("");

  // History
  saveHistory({
    ioc: data.ioc,
    verdict: data.verdict,
    confidence: data.confidence,
    time: data.timestamp
  });

  renderHistory();
}

/* ===== HISTORY ===== */
function saveHistory(entry) {
  const h = JSON.parse(localStorage.getItem("ioc_history") || "[]");
  h.unshift(entry);
  localStorage.setItem("ioc_history", JSON.stringify(h.slice(0, 20)));
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem("ioc_history") || "[]");
  document.getElementById("iocHistory").innerHTML = h.map(e => `
    <div class="p-2 bg-slate-800 rounded">
      <div>${e.ioc}</div>
      <div class="text-sm">${e.verdict} (${e.confidence})</div>
    </div>
  `).join("");
}

document.addEventListener("DOMContentLoaded", renderHistory);
</script>
