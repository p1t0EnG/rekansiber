<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RA Security | IOC Intelligence Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(ellipse at top, #0b1224, #05070f);
    }
  </style>
</head>
<body class="text-slate-200 min-h-screen">

  <!-- NAV -->
  <nav class="flex items-center justify-between px-8 py-4 bg-slate-900/40 backdrop-blur border-b border-white/5">
    <div class="text-xl font-bold text-violet-400">RA Security Dashboard</div>
    <div class="flex gap-6 text-sm">
      <a href="/" class="hover:text-violet-400">Home</a>
      <a href="/ioc" class="text-violet-400 font-semibold">IOC Checker</a>
      <a href="/secdashboard.html" class="hover:text-violet-400">Security Dashboard</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-4xl mx-auto px-6 py-20">

    <h1 class="text-4xl font-extrabold text-center text-violet-400 mb-3">
      IOC Intelligence Dashboard — Enterprise
    </h1>
    <p class="text-center text-slate-400 mb-12">
      Threat Intelligence Fusion from VirusTotal · AbuseIPDB · OTX · MXToolbox
    </p>

    <!-- INPUT CARD -->
    <div class="bg-slate-900/50 backdrop-blur rounded-2xl p-8 shadow-xl border border-white/5">

      <label class="block mb-2 text-sm font-medium text-slate-300">Enter IOC</label>
      <input
        id="iocInput"
        type="text"
        placeholder="IP / Domain / Hash"
        class="w-full rounded-lg bg-slate-800/60 border border-white/10 px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-violet-500"
      />

      <button
        id="runBtn"
        class="w-full mt-6 py-3 rounded-lg bg-violet-600 hover:bg-violet-700 font-semibold transition"
      >
        Run IOC Check
      </button>

      <p id="detectedType" class="text-sm text-slate-400 mt-3 hidden"></p>
    </div>

    <!-- LOADING -->
    <div id="loading" class="hidden mt-8 text-center text-slate-400">
      ⏳ Running intelligence checks…
    </div>

    <!-- ERROR -->
    <div id="errorBox" class="hidden mt-8 bg-red-900/40 border border-red-500/40 text-red-200 px-6 py-4 rounded-xl">
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="hidden mt-10 bg-slate-900/50 backdrop-blur border border-white/5 rounded-2xl p-8">
      <h2 class="text-xl font-bold mb-4 text-violet-400">Analysis Result</h2>
      <pre id="resultContent" class="text-sm text-slate-300 overflow-x-auto"></pre>
    </div>

  </main>

  <!-- SCRIPT -->
  <script>
    const input = document.getElementById("iocInput");
    const runBtn = document.getElementById("runBtn");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const resultBox = document.getElementById("resultBox");
    const resultContent = document.getElementById("resultContent");
    const detectedType = document.getElementById("detectedType");

    function hideAll() {
      loading.classList.add("hidden");
      errorBox.classList.add("hidden");
      resultBox.classList.add("hidden");
    }

    function detectType(ioc) {
      if (/^\d{1,3}(\.\d{1,3}){3}$/.test(ioc)) return "IP Address";
      if (/^[a-fA-F0-9]{32,64}$/.test(ioc)) return "Hash";
      return "Domain / URL";
    }

    runBtn.addEventListener("click", async () => {
      const ioc = input.value.trim();
      hideAll();

      if (!ioc) {
        errorBox.textContent = "IOC value is required.";
        errorBox.classList.remove("hidden");
        return;
      }

      detectedType.textContent = "Detected Type: " + detectType(ioc);
      detectedType.classList.remove("hidden");

      loading.classList.remove("hidden");

      try {
        const res = await fetch(`/api/ioc?ioc=${encodeURIComponent(ioc)}`);
        const data = await res.json();

        loading.classList.add("hidden");

        if (!res.ok) {
          throw new Error(data.error || "IOC check failed");
        }

        resultContent.textContent = JSON.stringify(data, null, 2);
        resultBox.classList.remove("hidden");

      } catch (err) {
        loading.classList.add("hidden");
        errorBox.textContent = err.message;
        errorBox.classList.remove("hidden");
      }
    });
  </script>

</body>
</html>
