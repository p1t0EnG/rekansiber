<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IOC Intelligence Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicon -->
  <link rel="icon" href="/images/favicon.ico">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

  <!-- Tailwind (for premium UI styling) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
<style>
:root{
  --bg:#020617;--panel:#0f172a;--border:#1e293b;
  --purple:#7c3aed;--green:#22c55e;
  --yellow:#f59e0b;--red:#ef4444;
  --text:#e5e7eb;--muted:#94a3b8;
}
  
  /* Glass effect for panel */
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

      /* Gradient text */
    .gradient-text {
      background: linear-gradient(90deg, #7b5cff, #ff5fb6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  header{text-align:center;padding:150px 20px 30px}
  header h1{margin:0;font-size:34px;color:#a78bfa}
  header p{margin-top:8px;color:var(--muted)}

.ioc-box{
  max-width:760px;margin:200px auto;
  background:linear-gradient(180deg,#0f172a,#020617);
  border:1px solid var(--border);
  border-radius:18px;padding:15px
}
.ioc-row{display:flex;gap:14px;margin-top:14px}
.ioc-row input{
  flex:1;padding:16px;border-radius:12px;
  border:1px solid var(--border);
  background:#020617;color:var(--text)
}
.ioc-row button{
  padding:16px 28px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  color:#fff;font-weight:700;cursor:pointer
}

#errorBox{
  display:none;max-width:760px;margin:20px auto;
  background:rgba(239,68,68,.15);
  border:1px solid var(--red);
  border-radius:12px;padding:14px;color:#fecaca
}


  
  body{background:#050814;color:#fff;font-family:Inter,Arial}
// .card{background:#0b1220;border-radius:14px;padding:60px;margin:16px auto;max-width:620px}
.badge{padding:4px 10px;border-radius:999px;font-size:12px}
.HIGH{background:#7f1d1d}.MEDIUM{background:#92400e}.LOW{background:#064e3b}
a{color:#8b5cf6;text-decoration:none}
.tag{background:#1f2937;padding:4px 8px;border-radius:8px;margin:2px;display:inline-block;font-size:12px}
</style>
</head>

<body>
 <!-- NAVBAR -->
  <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[92%] max-w-6xl glass rounded-2xl px-6 py-3 flex justify-between items-center shadow-xl z-20">
    <h1 class="text-xl font-bold gradient-text tracking-wide">RA SECURITY</h1>
    <div class="flex gap-6 text-gray-300 font-semibold">
      <a href="/" class="hover:text-white">Home</a>
      <a href="/ioc/index.html" class="hover:text-white">IOC Checker</a>
      <a href="secdashboard.html" class="hover:text-white">Dashboard</a>
      <a href="README.md" class="hover:text-white">Docs</a>
    </div>
  </nav>
    
<div class="ioc-box">
  <label>Enter IOC</label>
  <div class="ioc-row">
    <input id="iocInput" placeholder="IP / Domain / Hash">
    <button onclick="runIOC()">Run IOC Check</button>
  </div>
</div>

<div id="result"></div>

<script>
function saveHistory(ioc){
  let h=JSON.parse(localStorage.getItem("ioc_history")||"[]");
  h=h.filter(x=>x!==ioc); h.unshift(ioc);
  localStorage.setItem("ioc_history",JSON.stringify(h.slice(0,20)));
}

async function runIOC(){
  const ioc=document.getElementById("ioc").value.trim();
  if(!ioc) return;
  saveHistory(ioc);

  const r=await fetch(`/api/ioc?ioc=${ioc}`);
  const d=await r.json();

  const s=d.sources;
  document.getElementById("result").innerHTML=`
  ${block("VirusTotal",s.virustotal.verdict,`${s.virustotal.malicious}/${s.virustotal.total}`,s.virustotal.link)}
  ${block("AbuseIPDB",s.abuseipdb.verdict,s.abuseipdb.score,s.abuseipdb.link)}
  ${block("AlienVault OTX",s.otx.verdict,s.otx.pulses+" pulses",s.otx.link,
    s.otx.tags.map(t=>`<span class="tag">${t}</span>`).join(""))}
  ${block("MXToolbox",s.mxtoolbox.verdict,s.mxtoolbox.listed?"LISTED":"CLEAN",s.mxtoolbox.link)}
  `;
}

function block(name,v,val,link,extra=""){
  return `<div class="card">
    <b>${name}</b>
    <span class="badge ${v}">${v}</span>
    <h2>${val}</h2>
    ${extra}<br>
    <a href="${link}" target="_blank">View source ↗</a>
  </div>`;
}
</script>
</body>
</html>
