<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IOC Intelligence Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicon -->
  <link rel="icon" href="/images/favicon.ico">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

  <!-- Tailwind (for premium UI styling) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
<style>
:root{
  --bg:#020617;--panel:#0f172a;--border:#1e293b;
  --purple:#7c3aed;--green:#22c55e;
  --yellow:#f59e0b;--red:#ef4444;
  --text:#e5e7eb;--muted:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:Inter,system-ui,sans-serif;
  background:radial-gradient(circle at top,#020617,#000);
  color:var(--text)
}

 /* Glass effect for panel */
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

      /* Gradient text */
    .gradient-text {
      background: linear-gradient(90deg, #7b5cff, #ff5fb6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  
header{text-align:center;padding:150px 20px 30px}
header h1{margin:0;font-size:34px;color:#a78bfa}
header p{margin-top:8px;color:var(--muted)}

.ioc-box{
  max-width:760px;margin:40px auto;
  background:linear-gradient(180deg,#0f172a,#020617);
  border:1px solid var(--border);
  border-radius:18px;padding:26px
}
.ioc-row{display:flex;gap:14px;margin-top:14px}
.ioc-row input{
  flex:1;padding:16px;border-radius:12px;
  border:1px solid var(--border);
  background:#020617;color:var(--text)
}
.ioc-row button{
  padding:16px 28px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  color:#fff;font-weight:700;cursor:pointer
}

#errorBox{
  display:none;max-width:760px;margin:20px auto;
  background:rgba(239,68,68,.15);
  border:1px solid var(--red);
  border-radius:12px;padding:14px;color:#fecaca
}

#result{max-width:760px;margin:40px auto;display:none}

.card{
  background:linear-gradient(180deg,#0f172a,#020617);
  border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:20px
}
.card h3{margin:0 0 10px;font-size:18px}

.badge{
  display:inline-block;padding:6px 14px;
  border-radius:999px;font-weight:700;font-size:14px
}
.low{background:rgba(34,197,94,.15);color:var(--green)}
.medium{background:rgba(245,158,11,.15);color:var(--yellow)}
.high{background:rgba(239,68,68,.15);color:var(--red)}

.score{font-size:28px;font-weight:800}
.muted{color:var(--muted);font-size:14px}

footer{text-align:center;padding:40px 0 20px;color:var(--muted)}

/* OTX TAG LIST */
.otx-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.otx-tag {
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 12px;
  font-weight: 500;
  color: #e5e7eb;
  white-space: nowrap;
}

/* Source link */
.source-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  font-size: 13px;
  font-weight: 600;
  color: #a78bfa;
  text-decoration: none;
}

.source-link:hover {
  text-decoration: underline;
  color: #c4b5fd;
}

</style>
</head>

<body>
    
  <!-- NAVBAR -->
  <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[92%] max-w-6xl glass rounded-2xl px-6 py-3 flex justify-between items-center shadow-xl z-20">
    <h1 class="text-xl font-bold gradient-text tracking-wide">RA SECURITY</h1>
    <div class="flex gap-6 text-gray-300 font-semibold">
      <a href="/" class="hover:text-white">Home</a>
      <a href="ioc.html" class="hover:text-white">IOC Checker</a>
      <a href="secdashboard.html" class="hover:text-white">Dashboard</a>
      <a href="README.md" class="hover:text-white">Docs</a>
    </div>
  </nav>
  
<header>
  <h1>IOC Intelligence Dashboard</h1>
  <p>VirusTotal · AbuseIPDB · OTX · MXToolbox</p>
</header>

<div class="ioc-box">
  <label>Enter IOC</label>
  <div class="ioc-row">
    <input id="iocInput" placeholder="IP / Domain / Hash">
    <button onclick="runIOC()">Run IOC Check</button>
  </div>
</div>

<div id="errorBox"></div>

<div id="result">

  <div class="card">
    <h3>VirusTotal</h3>
    <span id="vtVerdict" class="badge"></span>
    <div class="score" id="vtScore"></div>
    <div class="muted">Malicious detections</div>
  </div>

  <div class="card">
    <h3>AbuseIPDB</h3>
    <span id="abuseVerdict" class="badge"></span>
    <div class="score" id="abuseScore"></div>
    <div class="muted">Abuse confidence score</div>
  </div>

  <div class="card">
    <h3>AlienVault OTX</h3>
    <span id="otxVerdict" class="badge"></span>
    <div class="score" id="otxScore"></div>
    <div class="muted">Pulse matches</div>
    <div id="otxTags" class="otx-tags"></div>

    <a id="otxLink" class="source-link" target="_blank">
      View on AlienVault OTX ↗
  </div>

</div>

<footer>RA Security © 2025</footer>

<script>
function saveHistory(ioc){
  let h=JSON.parse(localStorage.getItem("ioc_history")||"[]");
  h=h.filter(x=>x!==ioc); h.unshift(ioc);
  localStorage.setItem("ioc_history",JSON.stringify(h.slice(0,20)));
}

async function run(){
  const ioc=document.getElementById("ioc").value.trim();
  if(!ioc) return;
  saveHistory(ioc);

  const r=await fetch(`/api/ioc?ioc=${ioc}`);
  const d=await r.json();

  const s=d.sources;
  document.getElementById("result").innerHTML=`
  ${block("VirusTotal",s.virustotal.verdict,`${s.virustotal.malicious}/${s.virustotal.total}`,s.virustotal.link)}
  ${block("AbuseIPDB",s.abuseipdb.verdict,s.abuseipdb.score,s.abuseipdb.link)}
  ${block("AlienVault OTX",s.otx.verdict,s.otx.pulses+" pulses",s.otx.link,
    s.otx.tags.map(t=>`<span class="tag">${t}</span>`).join(""))}
  ${block("MXToolbox",s.mxtoolbox.verdict,s.mxtoolbox.listed?"LISTED":"CLEAN",s.mxtoolbox.link)}
  `;
}

function block(name,v,val,link,extra=""){
  return `<div class="card">
    <b>${name}</b>
    <span class="badge ${v}">${v}</span>
    <h2>${val}</h2>
    ${extra}<br>
    <a href="${link}" target="_blank">View source ↗</a>
  </div>`;
}
</script>
</body>
</html>
