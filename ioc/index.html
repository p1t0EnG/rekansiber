<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IOC Intelligence Dashboard</title>

<style>
:root {
  --bg: #020617;
  --panel: #0f172a;
  --border: #1e293b;
  --primary: #7c3aed;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --danger: #7f1d1d;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle at top, #020617 0%, #000 70%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
}

/* ===== HEADER ===== */
header {
  padding: 80px 20px 40px;
  text-align: center;
}

header h1 {
  font-size: 42px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #a78bfa, #7c3aed);
  -webkit-background-clip: text;
  color: transparent;
}

header p {
  color: var(--muted);
  font-size: 16px;
}

/* ===== INPUT PANEL ===== */
.container {
  max-width: 820px;
  margin: auto;
  padding: 20px;
}

.input-card {
  background: linear-gradient(180deg, #0f172a, #020617);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 0 0 1px rgba(124,58,237,.15),
              0 30px 80px rgba(0,0,0,.7);
}

.input-card label {
  display: block;
  font-weight: 600;
  margin-bottom: 12px;
  color: #c7d2fe;
}

.input-row {
  display: flex;
  gap: 12px;
}

.input-row input {
  flex: 1;
  padding: 16px 18px;
  background: #020617;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
}

.input-row input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(124,58,237,.25);
}

.input-row button {
  padding: 16px 28px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all .2s;
}

.input-row button:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 30px rgba(124,58,237,.4);
}

/* ===== ERROR ===== */
#errorBox {
  margin-top: 18px;
  background: linear-gradient(180deg, #7f1d1d, #450a0a);
  border: 1px solid #991b1b;
  padding: 14px 18px;
  border-radius: 12px;
  display: none;
}

/* ===== RESULT ===== */
#result {
  margin-top: 40px;
  display: none;
}

.card {
  background: #020617;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<header>
  <h1>IOC Intelligence Dashboard — Enterprise</h1>
  <p>Threat Intelligence Fusion from VirusTotal • AbuseIPDB • OTX • MXToolbox</p>
</header>

<div class="container">

  <div class="input-card">
    <label>Enter IOC</label>
    <div class="input-row">
      <input id="iocInput" placeholder="IP / Domain / Hash" />
      <button onclick="runIOC()">Run IOC Check</button>
    </div>
    <div id="errorBox"></div>
  </div>

  <div id="result">
    <!-- result will be rendered later -->
  </div>

</div>

<script>
async function runIOC() {
  const ioc = document.getElementById("iocInput").value.trim();
  if (!ioc) return;

  hideError();

  try {
    const res = await fetch(`/api/ioc?ioc=${encodeURIComponent(ioc)}`);
    if (!res.ok) throw new Error("API error");

    const data = await res.json();
    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
      "<div class='card'><pre>" +
      JSON.stringify(data, null, 2) +
      "</pre></div>";

  } catch (e) {
    showError("Failed to fetch IOC intelligence");
  }
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.innerText = msg;
  box.style.display = "block";
}

function hideError() {
  document.getElementById("errorBox").style.display = "none";
}
</script>

</body>
</html>
