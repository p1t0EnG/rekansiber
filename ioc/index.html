<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>IOC Intelligence Dashboard</title>

<style>
:root {
  --bg: #05060f;
  --card: #0b1220;
  --accent: #8b5cf6;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --high: #ef4444;
  --medium: #f59e0b;
  --low: #22c55e;
}

* { box-sizing: border-box; font-family: Inter, system-ui; }
body {
  margin: 0;
  background: radial-gradient(circle at top, #0b1020, #05060f);
  color: var(--text);
}

.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 0 20px;
}

h1 {
  text-align: center;
  font-size: 34px;
  margin-bottom: 6px;
}
.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 40px;
}

.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,.6);
}

.input-row {
  display: flex;
  gap: 12px;
}

input {
  flex: 1;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
  font-size: 15px;
}

button {
  padding: 14px 22px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.tool {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tool h3 {
  margin: 0;
}

.badge {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.high { background: rgba(239,68,68,.15); color: var(--high); }
.medium { background: rgba(245,158,11,.15); color: var(--medium); }
.low { background: rgba(34,197,94,.15); color: var(--low); }

.value {
  font-size: 28px;
  font-weight: 700;
}

.link {
  color: var(--accent);
  font-size: 13px;
  text-decoration: none;
}

.tags {
  margin-top: 10px;
}
.tag {
  display: inline-block;
  background: #020617;
  border: 1px solid #1e293b;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  margin: 4px;
}
footer {
  text-align: center;
  color: var(--muted);
  margin-top: 40px;
}
</style>
</head>

<body>
<div class="container">
  <h1>IOC Intelligence Dashboard</h1>
  <div class="subtitle">VirusTotal · AbuseIPDB · AlienVault OTX · MXToolbox</div>

  <div class="card">
    <div class="input-row">
      <input id="ioc" placeholder="Enter IP / Domain / Hash" />
      <button onclick="run()">Run IOC Check</button>
    </div>
  </div>

  <div id="results"></div>

  <footer>RA Security © 2025</footer>
</div>

<script>
async function run() {
  const ioc = document.getElementById('ioc').value.trim();
  if (!ioc) return;

  const r = document.getElementById('results');
  r.innerHTML = `<div class="card">Analyzing ${ioc}…</div>`;

  const res = await fetch(`/api/ioc?ioc=${encodeURIComponent(ioc)}`);
  const d = await res.json();

  r.innerHTML = `
  ${vt(d, ioc)}
  ${abuse(d, ioc)}
  ${otx(d, ioc)}
  ${mx(ioc)}
  `;
}

const badge = l =>
  `<span class="badge ${l.toLowerCase()}">${l}</span>`;

const vt = (d, i) => `
<div class="card">
  <div class="tool">
    <h3>VirusTotal</h3>
    ${badge(d.vt.level)}
  </div>
  <div class="value">${d.vt.malicious}/${d.vt.total}</div>
  <a class="link" target="_blank"
     href="https://www.virustotal.com/gui/ip-address/${i}">
     View on VirusTotal ↗
  </a>
</div>`;

const abuse = (d, i) => `
<div class="card">
  <div class="tool">
    <h3>AbuseIPDB</h3>
    ${badge(d.abuse.level)}
  </div>
  <div class="value">${d.abuse.score}</div>
  <a class="link" target="_blank"
     href="https://www.abuseipdb.com/check/${i}">
     View on AbuseIPDB ↗
  </a>
</div>`;

const otx = (d, i) => `
<div class="card">
  <div class="tool">
    <h3>AlienVault OTX</h3>
    ${badge(d.otx.level)}
  </div>
  <div class="value">${d.otx.pulses} pulses</div>
  <div class="tags">
    ${d.otx.tags.map(t => `<span class="tag">${t}</span>`).join('')}
  </div>
  <a class="link" target="_blank"
     href="https://otx.alienvault.com/indicator/ip/${i}">
     View on OTX ↗
  </a>
</div>`;

const mx = i => `
<div class="card">
  <div class="tool">
    <h3>MXToolbox</h3>
    ${badge('LOW')}
  </div>
  <div class="value">CHECK VIA WEB</div>
  <a class="link" target="_blank"
     href="https://mxtoolbox.com/SuperTool.aspx?action=blacklist%3a${i}">
     View on MXToolbox ↗
  </a>
</div>`;
</script>
</body>
</html>
