<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-UTF-8">
  <title>RA Security • IOC Intelligence Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #101725, #060a12 70%);
      color: #e5e7eb;
      font-family: 'Inter', sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .json-box {
      white-space: pre-wrap;
      background: #0f172a;
      border-radius: 10px;
      padding: 16px;
      color: #d1d5db;
      font-size: 14px;
      overflow-x: auto;
      border: 1px solid #1e293b;
      max-height: 450px;
    }
    .tab-active {
      border-bottom: 2px solid #6366f1;
      color: #fff;
    }
    .loader {
      border: 4px solid #1f2937;
      border-top: 4px solid #6366f1;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>

<body class="p-6">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center px-6 py-4 glass rounded-2xl max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-fuchsia-400 bg-clip-text text-transparent">
      RA Security Dashboard
    </h1>
    <div class="space-x-6 text-gray-300">
      <a href="/" class="hover:text-white">Home</a>
      <a href="/ioc.html" class="hover:text-white">IOC Checker</a>
      <a href="/secdashboard.html" class="hover:text-white">Security Dashboard</a>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="max-w-3xl mx-auto text-center mt-12">
    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-indigo-400 to-purple-400 to-fuchsia-400 bg-clip-text text-transparent">
      IOC Intelligence Dashboard — Enterprise
    </h1>
    <p class="text-gray-400 mt-3 text-lg">
      Threat Intelligence Fusion from VirusTotal • AbuseIPDB • OTX • MXToolbox
    </p>
  </div>

  <!-- INPUT CARD -->
  <div class="max-w-3xl mx-auto mt-10 glass p-8 rounded-2xl shadow-xl">

    <label class="block text-lg font-semibold mb-2">Enter IOC</label>
    <input id="ioc_input" type="text" placeholder="8.8.8.8 / google.com / SHA256"
      class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 focus:ring-2 focus:ring-purple-500 text-gray-200">

    <button onclick="runCheck()"
      class="mt-5 w-full py-3 rounded-xl bg-purple-600 hover:bg-purple-700 font-semibold text-white tracking-wide">
      Run IOC Check
    </button>

    <p id="iocType" class="text-center text-sm mt-3 text-gray-400"></p>
  </div>

  <!-- RESULTS -->
  <div class="max-w-5xl mx-auto mt-12">

    <div id="loading" class="hidden text-center">
      <div class="loader"></div>
      <p class="text-gray-400 mt-3">Contacting threat intelligence providers…</p>
    </div>

    <div id="tabs" class="hidden mt-10 flex gap-8 border-b border-gray-700 pb-2 text-gray-300 text-lg"></div>

    <div id="providerContent" class="mt-8"></div>

  </div>

<script>
const BACKEND_URL = "https://rasecurity-backend.onrender.com";

let resultData = null;

// ----------------------- MAIN CHECK -----------------------
async function runCheck() {
  const ioc = document.getElementById("ioc_input").value.trim();
  const loading = document.getElementById("loading");
  const tabs = document.getElementById("tabs");
  const container = document.getElementById("providerContent");
  const iocTypeLabel = document.getElementById("iocType");

  if (!ioc) { alert("Enter IOC first!"); return; }

  // Reset UI
  loading.classList.remove("hidden");
  tabs.classList.add("hidden");
  container.innerHTML = "";
  iocTypeLabel.textContent = "";

  try {
    const res = await fetch(`/api/ioc?ioc=${encodeURIComponent(ioc)}`);
    const data = await res.json();
    resultData = data;

    loading.classList.add("hidden");
    iocTypeLabel.textContent = `Detected Type: ${data.type.toUpperCase()}`;

    buildTabs(data.results);
    showProvider("virustotal");

  } catch (err) {
    container.innerHTML = `<div class="p-6 bg-red-900/40 rounded-xl border border-red-700">Error: ${err.message}</div>`;
    loading.classList.add("hidden");
  }
}

// ----------------------- TABS -----------------------
function buildTabs(results) {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  Object.keys(results).forEach(provider => {
    const btn = document.createElement("button");
    btn.className = "pb-2 transition hover:text-purple-400";
    btn.id = `tab-${provider}`;
    btn.textContent = provider.toUpperCase();
    btn.onclick = () => showProvider(provider);
    tabs.appendChild(btn);
  });

  tabs.classList.remove("hidden");
}

// ----------------------- DISPLAY PROVIDER -----------------------
function showProvider(provider) {
  const container = document.getElementById("providerContent");
  const data = resultData.results[provider];

  document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("tab-active"));
  document.getElementById(`tab-${provider}`).classList.add("tab-active");

  let section = "";

  // VIRUSTOTAL CHART
  if (provider === "virustotal" && data.data?.data?.attributes?.last_analysis_stats) {
    const stats = data.data.data.attributes.last_analysis_stats;
    const malicious = stats.malicious || 0;
    const suspicious = stats.suspicious || 0;
    const harmless = stats.harmless || 0;

    const total = malicious + suspicious + harmless || 1;

    section += `
      <div class="glass p-6 rounded-xl shadow-xl mb-6">
        <h2 class="text-2xl font-bold mb-3">VirusTotal Analysis</h2>

        <div class="flex items-center gap-10">

          <div>
            <canvas id="vtChart" width="140" height="140"></canvas>
          </div>

          <div>
            <p class="text-gray-300"><b>Malicious:</b> ${malicious}</p>
            <p class="text-gray-300"><b>Suspicious:</b> ${suspicious}</p>
            <p class="text-gray-300"><b>Harmless:</b> ${harmless}</p>
          </div>
        </div>
      </div>
    `;

    setTimeout(() => drawVTChart(malicious, suspicious, harmless), 200);
  }

  // ABUSEIPDB METER
  if (provider === "abuseipdb" && data.data?.data) {
    const score = data.data.data.abuseConfidenceScore || 0;

    const color = score > 80 ? "bg-red-600" :
                  score > 50 ? "bg-yellow-500" : "bg-green-600";

    section += `
      <div class="glass p-6 rounded-xl shadow-xl mb-6">
        <h2 class="text-2xl font-bold mb-4">AbuseIPDB Score</h2>

        <div class="w-full bg-gray-800 rounded-lg h-4">
          <div class="h-4 rounded-lg ${color}" style="width:${score}%;"></div>
        </div>

        <p class="mt-2 text-gray-300"><b>Abuse Confidence Score:</b> ${score}%</p>
      </div>
    `;
  }

  // JSON RAW VIEWER (collapsible)
  section += `
    <button onclick="toggleJSON()" 
      class="mt-4 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">
      Toggle Raw JSON
    </button>

    <div id="jsonRaw" class="json-box mt-4">${JSON.stringify(data, null, 2)}</div>
  `;

  container.innerHTML = section;
}

function toggleJSON() {
  const box = document.getElementById("jsonRaw");
  box.classList.toggle("hidden");
}

// ----------------------- VT DOUGHNUT CHART -----------------------
function drawVTChart(malicious, suspicious, harmless) {
  const canvas = document.getElementById("vtChart");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  const total = malicious + suspicious + harmless;

  const data = [
    { value: malicious, color: "#ef4444" },
    { value: suspicious, color: "#f59e0b" },
    { value: harmless, color: "#10b981" }
  ];

  let start = 0;

  data.forEach(segment => {
    const angle = (segment.value / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(70, 70);
    ctx.arc(70, 70, 70, start, start + angle);
    ctx.fillStyle = segment.color;
    ctx.fill();
    start += angle;
  });

  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(70, 70, 40, 0, 2 * Math.PI);
  ctx.fill();
  ctx.globalCompositeOperation = "source-over";
}
</script>

</body>
</html>
