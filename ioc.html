<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IOC Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background:#0b1220;
      color:#e5e7eb;
      font-family:system-ui;
      padding:40px;
    }
    input, button {
      padding:10px;
      font-size:16px;
    }
    button {
      background:#7c3aed;
      color:white;
      border:none;
      cursor:pointer;
    }
    pre {
      background:#020617;
      padding:16px;
      margin-top:20px;
      border-radius:8px;
    }
    .error {
      background:#7f1d1d;
      padding:12px;
      margin-top:20px;
      display:none;
    }
  </style>
</head>

<body>

<h1>IOC Intelligence</h1>

<input id="iocInput" placeholder="8.8.8.8">
<button onclick="runIOC()">Run IOC</button>

<div id="errorBox" class="error"></div>
<pre id="resultBox"></pre>


<script>
/* ================= CONFIG ================= */
const API_ENDPOINT = "/api/ioc";

/* ================= MAIN ================= */
async function runIOC() {
  const ioc = document.getElementById("iocInput").value.trim();
  if (!ioc) {
    alert("IOC required");
    return;
  }

  try {
    const res = await fetch(`${API_ENDPOINT}?ioc=${encodeURIComponent(ioc)}`);
    if (!res.ok) throw new Error("API error");

    const data = await res.json();

    // Verdict
    document.getElementById("verdictBadge").textContent = data.verdict;
    document.getElementById("confidenceBadge").textContent =
      `Confidence: ${data.confidence}`;

    // Explanation
    document.getElementById("explanationSummary").textContent =
      data.explanation.summary;

    document.getElementById("explanationList").innerHTML =
      data.explanation.details.map(d => `<li>${d}</li>`).join("");

    // History
    saveHistory({
      ioc: data.ioc,
      verdict: data.verdict,
      confidence: data.confidence,
      time: data.timestamp
    });

    renderHistory();

  } catch (err) {
    console.error(err);
    showError("Failed to fetch IOC intelligence");
  }
}

/* ================= ERROR ================= */
function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = msg;
  box.style.display = "block";
}

/* ================= HISTORY ================= */
function saveHistory(entry) {
  const h = JSON.parse(localStorage.getItem("ioc_history") || "[]");
  h.unshift(entry);
  localStorage.setItem("ioc_history", JSON.stringify(h.slice(0, 20)));
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem("ioc_history") || "[]");
  const el = document.getElementById("historyList");
  if (!el) return;

  el.innerHTML = h.map(e =>
    `<tr>
      <td>${e.ioc}</td>
      <td>${e.verdict}</td>
      <td>${e.confidence}</td>
      <td>${new Date(e.time).toLocaleString()}</td>
    </tr>`
  ).join("");
}
</script>
</body>
</html>
